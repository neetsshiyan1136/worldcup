name: Sync World Cup Data

on:
  schedule:
    - cron: '0 2 * * *'   # 10:00 Beijing time (UTC+8)
    - cron: '0 14 * * *'  # 22:00 Beijing time (UTC+8)
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Sync data from API
        run: node sync-data.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto sync data $(date -u '+%Y-%m-%d %H:%M')"
          git push
